<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐莎品牌目录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f5f0ff 0%,#fdf2f8 50%,#ecfdf5 100%);min-height:100vh;color:#1a1a2e}
.hero{background:#ffffff;color:#dc2626;text-align:center;padding:48px 20px 40px;position:relative;overflow:hidden}
.hero .logo-title{display:flex;align-items:center;justify-content:center;gap:12px}
.hero .logo-title img{height:80px;width:auto}
.hero h1{font-size:2rem;font-weight:800;letter-spacing:2px;margin-bottom:0}
.hero p{font-size:.95rem;opacity:.9}
.hero .count{display:none}
.container{max-width:1000px;margin:0 auto;padding:24px 20px 60px}
.search-wrap{display:flex;justify-content:center;margin-bottom:24px;position:relative}
.search-wrap input{width:100%;max-width:420px;padding:14px 20px 14px 48px;border-radius:28px;border:none;font-size:.92rem;outline:none;box-shadow:0 4px 24px rgba(0,0,0,.06);background:#fff}
.search-wrap input:focus{box-shadow:0 4px 32px rgba(124,58,237,.2)}
.search-wrap .icon{position:absolute;left:calc(50% - 190px);top:50%;transform:translateY(-50%);font-size:1.1rem}
@media(max-width:480px){.search-wrap .icon{left:16px}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{border-radius:20px;padding:28px 24px;cursor:pointer;transition:all .25s;box-shadow:0 2px 12px rgba(0,0,0,.04);text-decoration:none;display:flex;flex-direction:column;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(124,58,237,.12)}
.brand-name{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.brand-sub{font-size:.82rem;opacity:.7;margin-bottom:12px}
.empty{text-align:center;padding:40px;color:#999;font-size:1.1rem}
.footer{text-align:center;padding:20px;color:#aaa;font-size:.78rem}
@media(max-width:600px){.hero h1{font-size:1.5rem}.hero{padding:36px 16px 30px}.grid{grid-template-columns:1fr}.card{padding:22px 20px}}
</style>
</head>
<body>
<div class="hero">
<div class="logo-title">
<img src="https://cdn.jsdelivr.net/gh/urans520/brands@main/images/lesha-logo.png" alt="乐莎">
<h1>乐莎品牌目录</h1>
</div>
<p>点击品牌卡片直达产品文档</p>
</div>
<div class="container">
<div class="search-wrap">
<span class="icon">🔍</span>
<input id="search" placeholder="搜索品牌..." oninput="filter()">
</div>
<div class="grid" id="grid"></div>
<div id="empty" style="display:none" class="empty">没有匹配的品牌</div>
</div>
<div class="footer">点击跳转产品展示 · 持续更新中</div>
<script>
var brands=[
{"name":"BIODE RUO 贝德洛","subtitle":"萌趣童心","url":"https://www.kdocs.cn/l/cfNZcbf2lPeu","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_62d7a7af84f21.jpg","bgOpacity":60},
{"name":"时刻芭莎 it's for you","subtitle":"高定美妆工具","url":"https://www.kdocs.cn/l/cbEu2ABZ62cl","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_66616fdbc702d.jpg","bgOpacity":57},
{"name":"拉法自然","subtitle":"甄致系列","url":"https://www.kdocs.cn/l/cdniGLK5aJsQ","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/5ff128118b975.jpg","bgOpacity":52},
{"name":"NRCS 迷若初时","subtitle":"高定美妆工具","url":"https://www.kdocs.cn/l/cclwIhD4Lhmd","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_663b293415fb9.jpg","bgOpacity":51},
{"name":"Rosekaev 露丝卡文","subtitle":"时空奢品","url":"https://www.kdocs.cn/l/cqrULSyYAzjJ","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_672c83e3bac1c.jpg","bgOpacity":53},
{"name":"然之迷","subtitle":"轻奢生活","url":"https://www.kdocs.cn/l/cnssPpFdeRCK","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/62832f8991eff.jpg","bgOpacity":54},
{"name":"贝德洛","subtitle":"","url":"https://www.kdocs.cn/l/cajN7a6taEtO","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_61385607ad8ef.jpg","bgOpacity":55},
{"name":"拉法 - 毕加索","subtitle":"","url":"https://www.kdocs.cn/l/cqNRCmRq6Bh3","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_61382b8184817.jpg","bgOpacity":51},
{"name":"萌呗比 MONKiDS","subtitle":"","url":"https://www.kdocs.cn/l/ckJvvvuh6geZ","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/5cf6044ef174f.jpg","bgOpacity":54},
{"name":"女人传说","subtitle":"英伦风","url":"https://www.kdocs.cn/l/cvOorl9vSLv6","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/5f03033dca58a.jpg","bgOpacity":48},
{"name":"女人传说","subtitle":"W系列","url":"https://www.kdocs.cn/l/co2vOAFBBWjI","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_642fb2bd3fde3.jpg","bgOpacity":56},
{"name":"女人传说","subtitle":"日系小清新","url":"https://www.kdocs.cn/l/cutNGxU70LDT","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_612c576746ec1.jpg","bgOpacity":46},
{"name":"YOUSE","subtitle":"","url":"https://www.kdocs.cn/l/cojJvCNZUI8X","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/thumb_5dbfcc49a4fa2.jpg","bgOpacity":60},
{"name":"拉法","subtitle":"拉法美妆","url":"https://www.kdocs.cn/l/crAxkpnd3r9r","bgImage":"https://cdn.jsdelivr.net/gh/urans520/brands@main/images/ScreenShot_2026-05-13_103541_635.jpg","bgOpacity":69}
];
function render(list){
var g=document.getElementById("grid");
if(!list.length){g.innerHTML="";document.getElementById("empty").style.display="block";return}
document.getElementById("empty").style.display="none";
var h="";
list.forEach(function(b){
var opacity=(b.bgOpacity||100)/100;
var tc="#7c3aed";
if(b.bgImage){
var overlayOpacity=1-opacity;
h+='<a class="card" href="'+b.url+'" target="_blank" style="overflow:hidden;background:url(\''+b.bgImage+'\') center/cover no-repeat;position:relative;">';
h+='<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,'+overlayOpacity+');z-index:0;"></div>';
h+='<div style="position:relative;z-index:1;">';
h+='<div class="brand-name" style="color:'+tc+'">'+b.name+'</div>';
if(b.subtitle)h+='<div class="brand-sub" style="color:'+tc+'">'+b.subtitle+'</div>';
h+='</div>';
h+='</a>';
}
});
g.innerHTML=h;
}
function filter(){
var q=document.getElementById("search").value.toLowerCase();
if(!q)render(brands);
else render(brands.filter(function(b){return(b.name+" "+(b.subtitle||"")).toLowerCase().indexOf(q)>=0}));
}
render(brands);
</script>
</body>
</html>
