<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐莎品牌目录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f5f0ff 0%,#fdf2f8 50%,#ecfdf5 100%);min-height:100vh;color:#1a1a2e}
.hero{background:#ffffff;color:#ffffff;text-align:center;padding:48px 20px 40px;position:relative;overflow:hidden}
.hero h1{font-size:2rem;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.hero p{font-size:.95rem;opacity:.9}
.hero .count{display:none}
.container{max-width:1000px;margin:0 auto;padding:24px 20px 60px}
.search-wrap{display:flex;justify-content:center;margin-bottom:24px;position:relative}
.search-wrap input{width:100%;max-width:420px;padding:14px 20px 14px 48px;border-radius:28px;border:none;font-size:.92rem;outline:none;box-shadow:0 4px 24px rgba(0,0,0,.06);background:#fff}
.search-wrap input:focus{box-shadow:0 4px 32px rgba(124,58,237,.2)}
.search-wrap .icon{position:absolute;left:calc(50% - 190px);top:50%;transform:translateY(-50%);font-size:1.1rem}
@media(max-width:480px){.search-wrap .icon{left:16px}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{border-radius:20px;padding:28px 24px;cursor:pointer;transition:all .25s;box-shadow:0 2px 12px rgba(0,0,0,.04);text-decoration:none;display:flex;flex-direction:column;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(124,58,237,.12)}
.brand-name{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.brand-sub{font-size:.82rem;opacity:.7;margin-bottom:12px}
.brand-link{font-size:.75rem;color:#7c3aed;display:flex;align-items:center;gap:4px;margin-top:auto}
.brand-link span{font-size:.9rem}
.empty{text-align:center;padding:40px;color:#999;font-size:1.1rem}
.footer{text-align:center;padding:20px;color:#aaa;font-size:.78rem}
@media(max-width:600px){.hero h1{font-size:1.5rem}.hero{padding:36px 16px 30px}.grid{grid-template-columns:1fr}.card{padding:22px 20px}}
</style>
</head>
<body>
<div class="hero">
<h1>乐莎品牌目录</h1>
<p>点击品牌卡片直达产品文档</p>
</div>
<div class="container">
<div class="search-wrap">
<span class="icon">🔍</span>
<input id="search" placeholder="搜索品牌..." oninput="filter()">
</div>
<div class="grid" id="grid"></div>
<div id="empty" style="display:none" class="empty">没有匹配的品牌</div>
</div>
<div class="footer">点击跳转产品展示 · 持续更新中</div>
<script>
var brands=[{"name":"BIODE RUO 贝德洛","subtitle":"萌趣童心","url":"https://www.kdocs.cn/l/cfNZcbf2lPeu","color":"#fef3c7","bgOpacity":60,"textColor":"#7c3aed"},{"name":"时刻芭莎 it's for you","subtitle":"高定美妆工具","url":"https://www.kdocs.cn/l/cbEu2ABZ62cl","color":"#fce7f3","bgOpacity":57,"textColor":"#7c3aed"},{"name":"拉法自然","subtitle":"甄致系列","url":"https://www.kdocs.cn/l/cdniGLK5aJsQ","color":"#d1fae5","bgOpacity":52,"textColor":"#7c3aed"},{"name":"NRCS 迷若初时","subtitle":"高定美妆工具","url":"https://www.kdocs.cn/l/cclwIhD4Lhmd","color":"#ede9fe","bgOpacity":51,"textColor":"#7c3aed"},{"name":"Rosekaev 露丝卡文","subtitle":"时空奢品","url":"https://www.kdocs.cn/l/cqrULSyYAzjJ","color":"#fce7f3","bgOpacity":53,"textColor":"#7c3aed"},{"name":"然之迷","subtitle":"轻奢生活","url":"https://www.kdocs.cn/l/cnssPpFdeRCK","color":"#dbeafe","bgOpacity":54,"textColor":"#7c3aed"},{"name":"贝德洛","subtitle":"","url":"https://www.kdocs.cn/l/cajN7a6taEtO","color":"#fef3c7","bgOpacity":55,"textColor":"#7c3aed"},{"name":"拉法 - 毕加索","subtitle":"","url":"https://www.kdocs.cn/l/cqNRCmRq6Bh3","color":"#ede9fe","bgOpacity":51,"textColor":"#7c3aed"},{"name":"萌呗比 MONKiDS","subtitle":"","url":"https://www.kdocs.cn/l/ckJvvvuh6geZ","color":"#d1fae5","bgOpacity":54,"textColor":"#7c3aed"},{"name":"女人传说","subtitle":"英伦风","url":"https://www.kdocs.cn/l/cvOorl9vSLv6","color":"#fce7f3","bgOpacity":48,"textColor":"#7c3aed"},{"name":"女人传说","subtitle":"W系列","url":"https://www.kdocs.cn/l/co2vOAFBBWjI","color":"#dbeafe","bgOpacity":56,"textColor":"#7c3aed"},{"name":"女人传说","subtitle":"日系小清新","url":"https://www.kdocs.cn/l/cutNGxU70LDT","color":"#d1fae5","bgOpacity":46,"textColor":"#7c3aed"},{"name":"YOUSE","subtitle":"","url":"https://www.kdocs.cn/l/cojJvCNZUI8X","color":"#ede9fe","bgOpacity":60,"textColor":"#7c3aed"},{"name":"拉法","subtitle":"拉法美妆","url":"https://www.kdocs.cn/l/crAxkpnd3r9r","color":"#ede9fe","bgOpacity":69,"textColor":"#7c3aed"}];
function render(list){var g=document.getElementById("grid");if(!list.length){g.innerHTML="";document.getElementById("empty").style.display="block";return}document.getElementById("empty").style.display="none";var h="";list.forEach(function(b){var bg=b.color||"#fee2e2";var tc=b.textColor||"#dc2626";h+='<a class="card" href="'+b.url+'" target="_blank" style="background:'+bg+'"><div class="brand-name" style="color:'+tc+'">'+b.name+'</div>';if(b.subtitle)h+='<div class="brand-sub" style="color:'+tc+'">'+b.subtitle+'</div>';h+='</a>';});g.innerHTML=h;document.querySelector(".count").textContent=list.length+" 个品牌"}
function filter(){var q=document.getElementById("search").value.toLowerCase();if(!q)render(brands);else render(brands.filter(function(b){return(b.name+" "+(b.subtitle||"")).toLowerCase().indexOf(q)>=0}))}
render(brands);
</script>
</body>
</html>
